<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limpiador IKEA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c26;
  --border:#2a2a3a;
  --border2:#363650;
  --accent:#FFDA1A;
  --accent2:#0051BA;
  --green:#22c55e;
  --red:#ef4444;
  --text:#f0f0ff;
  --muted:#7070a0;
  --dim:#404060;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

/* background grid */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.25;
  pointer-events:none;
}

.card{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:12px;
  width:min(540px,100%);
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,218,26,.06);
  position:relative;
  z-index:1;
}

/* accent top bar */
.card::before{
  content:'';
  display:block;
  height:3px;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
}

.card-header{
  padding:22px 28px 18px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:14px;
}
.logo-box{
  width:38px;height:38px;
  background:var(--accent);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-box svg{width:22px;height:22px;}
.header-text h1{
  font-family:var(--mono);
  font-size:13px;
  font-weight:700;
  letter-spacing:2px;
  color:var(--accent);
  text-transform:uppercase;
}
.header-text p{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
  font-family:var(--mono);
}

.card-body{padding:24px 28px;display:flex;flex-direction:column;gap:20px;}

/* Drop zone */
.drop-zone{
  border:2px dashed var(--border2);
  border-radius:8px;
  padding:36px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  cursor:pointer;
  transition:all .18s;
  background:var(--bg);
  text-align:center;
  position:relative;
}
.drop-zone:hover,.drop-zone.drag{
  border-color:var(--accent);
  background:rgba(255,218,26,.03);
}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{
  width:44px;height:44px;
  background:var(--surface2);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border2);
  transition:all .18s;
}
.drop-zone:hover .drop-icon,.drop-zone.drag .drop-icon{
  border-color:var(--accent);
  background:rgba(255,218,26,.07);
}
.drop-icon svg{width:20px;height:20px;color:var(--muted);}
.drop-zone:hover .drop-icon svg,.drop-zone.drag .drop-icon svg{color:var(--accent);}
.drop-label{font-size:13px;font-weight:500;color:var(--text);}
.drop-sub{font-size:11px;color:var(--muted);font-family:var(--mono);}

/* File loaded state */
.file-loaded{
  border:1px solid var(--border2);
  border-radius:8px;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--surface2);
}
.file-icon{
  width:34px;height:34px;flex-shrink:0;
  background:rgba(0,81,186,.15);
  border:1px solid rgba(0,81,186,.25);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
}
.file-info{flex:1;min-width:0;}
.file-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);}
.file-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--mono);}
.file-remove{background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:4px;border-radius:4px;transition:all .12s;line-height:1;}
.file-remove:hover{color:var(--red);background:rgba(239,68,68,.1);}

/* Stats row */
.stats-row{
  display:flex;gap:8px;
}
.stat-box{
  flex:1;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:6px;
  padding:10px 12px;
}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono);line-height:1;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:3px;}
.stat-box.removed .stat-val{color:var(--red);}
.stat-box.kept .stat-val{color:var(--green);}
.stat-box.neutral .stat-val{color:var(--accent);}

/* Columns preview */
.cols-preview{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px 14px;
}
.cols-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;font-family:var(--mono);}
.cols-chips{display:flex;flex-wrap:wrap;gap:5px;}
.col-chip{
  font-size:10px;font-family:var(--mono);
  padding:2px 8px;border-radius:20px;
  background:rgba(0,81,186,.12);
  border:1px solid rgba(0,81,186,.2);
  color:#7bb8ff;
}
.col-chip.missing{
  background:rgba(239,68,68,.1);
  border-color:rgba(239,68,68,.2);
  color:#fca5a5;
}

/* Log */
.log{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px 14px;
  font-family:var(--mono);
  font-size:10px;
  line-height:1.8;
  max-height:120px;
  overflow-y:auto;
  color:var(--muted);
}
.log-line.ok{color:var(--green);}
.log-line.warn{color:var(--accent);}
.log-line.err{color:var(--red);}
.log-line.info{color:#7bb8ff;}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

/* Button */
.btn-process{
  background:var(--accent);
  color:#0a0a0f;
  border:none;
  border-radius:7px;
  padding:13px 20px;
  font-family:var(--mono);
  font-size:12px;
  font-weight:700;
  letter-spacing:.5px;
  cursor:pointer;
  width:100%;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  text-transform:uppercase;
}
.btn-process:hover:not(:disabled){
  background:#ffe833;
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(255,218,26,.25);
}
.btn-process:disabled{opacity:.3;cursor:not-allowed;transform:none;}

.btn-download{
  background:transparent;
  color:var(--green);
  border:1px solid var(--green);
  border-radius:7px;
  padding:13px 20px;
  font-family:var(--mono);
  font-size:12px;
  font-weight:700;
  letter-spacing:.5px;
  cursor:pointer;
  width:100%;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  text-transform:uppercase;
}
.btn-download:hover{
  background:rgba(34,197,94,.1);
  box-shadow:0 4px 16px rgba(34,197,94,.15);
}

.hidden{display:none!important;}

/* Filename badge */
.fname-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,218,26,.08);
  border:1px solid rgba(255,218,26,.2);
  border-radius:4px;
  padding:3px 9px;
  font-size:11px;
  font-family:var(--mono);
  color:var(--accent);
  width:100%;
  justify-content:center;
}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo-box">
      <!-- IKEA-style logo -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="6" width="18" height="12" rx="2" fill="#0051BA"/>
        <text x="12" y="15" font-size="7" font-weight="800" font-family="monospace" fill="#FFDA1A" text-anchor="middle">IKE</text>
      </svg>
    </div>
    <div class="header-text">
      <h1>Limpiador de Rutas</h1>
      <p>Filtro IKEA · RM · Sin patente vacía</p>
    </div>
  </div>

  <div class="card-body">

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="onDrop(event)">
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.txt" onchange="onFileSelect(this)">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="drop-label">Arrastra el archivo o haz clic</div>
      <div class="drop-sub">.xlsx · .xls · .csv · .txt · IKEA · RM</div>
    </div>

    <!-- File loaded info -->
    <div class="file-loaded hidden" id="fileLoaded">
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name" id="fileName">archivo.csv</div>
        <div class="file-meta" id="fileMeta">—</div>
      </div>
      <button class="file-remove" onclick="resetAll()" title="Quitar archivo">✕</button>
    </div>

    <!-- Columns check -->
    <div class="cols-preview hidden" id="colsPreview">
      <div class="cols-title">Columnas detectadas requeridas</div>
      <div class="cols-chips" id="colsChips"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row hidden" id="statsRow">
      <div class="stat-box neutral">
        <div class="stat-val" id="stTotal">0</div>
        <div class="stat-lbl">Total filas</div>
      </div>
      <div class="stat-box removed">
        <div class="stat-val" id="stRemoved">0</div>
        <div class="stat-lbl">Eliminadas</div>
      </div>
      <div class="stat-box kept">
        <div class="stat-val" id="stKept">0</div>
        <div class="stat-lbl">Resultado</div>
      </div>
    </div>

    <!-- Log -->
    <div class="log hidden" id="logBox"></div>

    <!-- Output filename badge -->
    <div class="fname-badge hidden" id="fnameBadge">📁 —</div>

    <!-- Buttons -->
    <button class="btn-process" id="btnProcess" onclick="procesar()" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Procesar archivo
    </button>

    <button class="btn-download hidden" id="btnDownload" onclick="descargar()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Descargar CSV limpio
    </button>

  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
var REQUIRED_COLS = ['Estado','Patente','Region','Volumen','LPN','Commerce','ParentOrder'];
var FILTER_REGION = 'metropolitana';  // solo Región Metropolitana
var TARGET_COMMERCE = 'ikea';  // case-insensitive match

// ─── State ───────────────────────────────────────────────────────────────────
var _file = null;
var _rawRows = [];
var _headers = [];
var _colMap = {};   // normalized key → original header name
var _outputRows = null;
var _outputFilename = '';

// ─── Utilities ───────────────────────────────────────────────────────────────
function norm(s){ return (s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function log(msg, type){
  var box = document.getElementById('logBox');
  box.classList.remove('hidden');
  var line = document.createElement('div');
  line.className = 'log-line ' + (type||'info');
  var now = new Date();
  var ts = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
  line.textContent = '['+ts+'] ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function extractDateFromFilename(name){
  // Try yyyy-MM-ddTHH:mm or yyyy-MM-dd or yyyyMMdd etc.
  var m;
  // ISO datetime: 2024-05-13T15:30 or 2024-05-13T1530 or 2024-05-13 15:30
  m = name.match(/(\d{4}[-_]?\d{2}[-_]?\d{2})[T_ ]?(\d{2}[:\-]?\d{2})?/);
  if(m){
    var datePart = m[1].replace(/[-_]/g,'-');
    var timePart = m[2] ? m[2].replace(/[:\-]/g,'').replace(/(\d{2})(\d{2})/,'$1$2') : null;
    return datePart + (timePart ? 'T'+timePart.substring(0,2)+timePart.substring(2,4) : '');
  }
  return null;
}

function buildOutputFilename(originalName, date){
  var d = date || new Date().toISOString().substring(0,16); // yyyy-MM-ddTHH:mm
  // Format: Reporte_Geo_2024-05-13_15:30
  var clean = d.replace('T','_').replace(/:/g,':');
  return 'Reporte_Geo_' + clean + '.csv';
}

// ─── File handling ────────────────────────────────────────────────────────────
function onDrop(e){
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag');
  var f = e.dataTransfer.files[0];
  if(f) handleFile(f);
}
function onFileSelect(input){
  if(input.files[0]) handleFile(input.files[0]);
}

function handleFile(file){
  _file = file;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var rows;
      if(/\.xlsx?$/i.test(file.name)){
        var wb = XLSX.read(e.target.result, {type:'array'});
        rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''});
      } else {
        var text = e.target.result;
        // detect separator before parsing
        var first = text.split(/\r?\n/)[0]||'';
        var tabs=(first.match(/\t/g)||[]).length, semis=(first.match(/;/g)||[]).length, commas=(first.match(/,/g)||[]).length;
        var detectedSep = tabs>=semis&&tabs>=commas?'TAB':semis>=commas?';':',';
        rows = parseCSV(text);
        log('Separador detectado: "'+detectedSep+'"', 'info');
      }
      _rawRows = rows;
      _headers = rows.length ? Object.keys(rows[0]) : [];
      buildColMap();
      showFileInfo(file, rows.length);
      document.getElementById('btnProcess').disabled = false;
      document.getElementById('btnDownload').classList.add('hidden');
      document.getElementById('statsRow').classList.add('hidden');
      document.getElementById('fnameBadge').classList.add('hidden');
      clearLog();
      log('Archivo cargado: '+file.name, 'ok');
      log(_headers.length+' columnas · '+rows.length+' filas', 'info');
    } catch(err){
      log('Error leyendo archivo: '+err.message, 'err');
    }
  };
  if(/\.xlsx?$/i.test(file.name)) reader.readAsArrayBuffer(file);
  else reader.readAsText(file, 'UTF-8');
}

function parseCSV(text){
  var lines = text.split(/\r?\n/).filter(Boolean);
  if(!lines.length) return [];
  // detect separator: check tab, semicolon, comma
  var first = lines[0];
  var tabs   = (first.match(/\t/g)||[]).length;
  var semis  = (first.match(/;/g)||[]).length;
  var commas = (first.match(/,/g)||[]).length;
  var sep = tabs >= semis && tabs >= commas ? '\t' : semis >= commas ? ';' : ',';
  var headers = splitCSVLine(lines[0], sep);
  return lines.slice(1).map(function(l){
    var vals = splitCSVLine(l, sep);
    var obj = {};
    headers.forEach(function(h,i){ obj[h] = vals[i] !== undefined ? vals[i] : ''; });
    return obj;
  });
}

function splitCSVLine(line, sep){
  var result=[], cur='', inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===sep&&!inQ){result.push(cur.trim().replace(/^"|"$/g,''));cur='';}
    else cur+=c;
  }
  result.push(cur.trim().replace(/^"|"$/g,''));
  return result;
}

function buildColMap(){
  _colMap = {};
  _headers.forEach(function(h){
    _colMap[norm(h)] = h;
  });
}

function findHeader(target){
  var n = norm(target);
  if(_colMap[n]) return _colMap[n];
  // fuzzy: contains
  var keys = Object.keys(_colMap);
  for(var i=0;i<keys.length;i++){
    if(keys[i].indexOf(n)>=0||n.indexOf(keys[i])>=0) return _colMap[keys[i]];
  }
  return null;
}

function showFileInfo(file, count){
  document.getElementById('dropZone').classList.add('hidden');
  document.getElementById('fileLoaded').classList.remove('hidden');
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileMeta').textContent = count+' filas · '+(file.size>1024*1024?(file.size/1024/1024).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB');

  // Columns check
  var chips = '';
  REQUIRED_COLS.forEach(function(col){
    var found = !!findHeader(col);
    chips += '<span class="col-chip'+(found?'':' missing')+'">'+(found?'✓ ':'✗ ')+col+'</span>';
  });
  document.getElementById('colsChips').innerHTML = chips;
  document.getElementById('colsPreview').classList.remove('hidden');
}

function clearLog(){
  var box = document.getElementById('logBox');
  box.innerHTML = '';
  box.classList.add('hidden');
}

function resetAll(){
  _file=null;_rawRows=[];_headers=[];_colMap={};_outputRows=null;
  document.getElementById('dropZone').classList.remove('hidden');
  document.getElementById('fileLoaded').classList.add('hidden');
  document.getElementById('colsPreview').classList.add('hidden');
  document.getElementById('statsRow').classList.add('hidden');
  document.getElementById('fnameBadge').classList.add('hidden');
  document.getElementById('btnProcess').disabled=true;
  document.getElementById('btnDownload').classList.add('hidden');
  document.getElementById('fileInput').value='';
  clearLog();
}

// ─── Processing ───────────────────────────────────────────────────────────────
function procesar(){
  if(!_rawRows.length){ log('No hay datos cargados','err'); return; }
  clearLog();

  var total = _rawRows.length;
  log('Iniciando procesamiento de '+total+' filas...', 'info');

  // Find each required column
  var colActual = {};
  var missingCols = [];
  REQUIRED_COLS.forEach(function(col){
    var h = findHeader(col);
    if(h) colActual[col] = h;
    else missingCols.push(col);
  });

  if(missingCols.length){
    log('Columnas no encontradas: '+missingCols.join(', '),'err');
    log('Columnas disponibles: '+_headers.slice(0,10).join(', ')+((_headers.length>10)?'...':''),'warn');
    return;
  }

  log('Columnas mapeadas correctamente ✓', 'ok');

  // Filter 1: Commerce = IKEA
  var step1 = _rawRows.filter(function(r){
    var v = (r[colActual['Commerce']]||'').trim();
    return norm(v) === TARGET_COMMERCE;
  });
  var removedCommerce = total - step1.length;
  log('Filtro Commerce=IKEA: eliminadas '+removedCommerce+' filas ('+step1.length+' quedan)', removedCommerce>0?'warn':'ok');

  // Filter 1b: Region Metropolitana
  var stepR = step1.filter(function(r){
    var v = norm(r[colActual['Region']]||'');
    return v.indexOf(FILTER_REGION) >= 0;
  });
  var removedRegion = step1.length - stepR.length;
  log('Filtro Región Metropolitana: eliminadas '+removedRegion+' filas ('+stepR.length+' quedan)', removedRegion>0?'warn':'ok');
  step1 = stepR;

  // Filter 2: Patente no vacía
  var step2 = step1.filter(function(r){
    var v = (r[colActual['Patente']]||'').trim();
    return v !== '' && v !== null && v !== undefined;
  });
  var removedPatente = step1.length - step2.length;
  log('Filtro Patente no vacía: eliminadas '+removedPatente+' filas ('+step2.length+' quedan)', removedPatente>0?'warn':'ok');

  // Keep only required columns, in order
  _outputRows = step2.map(function(r){
    var row = {};
    REQUIRED_COLS.forEach(function(col){
      row[col] = r[colActual[col]];
    });
    return row;
  });

  var kept = _outputRows.length;
  var removed = total - kept;

  // Stats
  document.getElementById('stTotal').textContent = total.toLocaleString('es-CL');
  document.getElementById('stRemoved').textContent = removed.toLocaleString('es-CL');
  document.getElementById('stKept').textContent = kept.toLocaleString('es-CL');
  document.getElementById('statsRow').classList.remove('hidden');

  // Output filename from original filename date
  var dateStr = _file ? extractDateFromFilename(_file.name) : null;
  _outputFilename = buildOutputFilename(_file ? _file.name : 'archivo', dateStr);
  document.getElementById('fnameBadge').textContent = '📁 ' + _outputFilename;
  document.getElementById('fnameBadge').classList.remove('hidden');

  log('Listo → '+kept+' filas · '+_outputFilename, 'ok');

  document.getElementById('btnDownload').classList.remove('hidden');
}

// ─── Download ─────────────────────────────────────────────────────────────────
function descargar(){
  if(!_outputRows || !_outputRows.length){ log('Procesa un archivo primero','err'); return; }

  // Build CSV string
  var lines = [REQUIRED_COLS.map(escapeCSV).join(',')];
  _outputRows.forEach(function(r){
    lines.push(REQUIRED_COLS.map(function(c){ return escapeCSV(r[c]||''); }).join(','));
  });
  var csv = '\uFEFF' + lines.join('\r\n'); // BOM for Excel

  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = _outputFilename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  log('Descargando '+_outputFilename+' ✓','ok');
}

function escapeCSV(val){
  var s = String(val === null || val === undefined ? '' : val);
  if(s.includes(',') || s.includes('"') || s.includes('\n')){
    return '"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}
